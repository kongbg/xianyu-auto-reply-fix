name: 功能建议
description: 提出功能建议、交互优化或新特性需求
title: "[功能建议] "
labels:
  - 功能建议
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 请先描述当前痛点，而不是只写结论
      placeholder: 例如：目前风控日志缺少按时间范围筛选，排查历史问题不方便
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的建议方案
      description: 请尽量说明你希望的交互、行为或判断逻辑
      placeholder: 例如：增加 当日 / 7天 / 全部 的时间筛选按钮
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 是否考虑过其他方案
      placeholder: 例如：也可以放在设置里做成开关，但我更倾向于放在统计卡片顶部

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可附上截图、草图、使用场景或相关 Issue 链接
